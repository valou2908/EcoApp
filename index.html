<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EcoApp – Forum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>EcoApp – Forum</h1>
    <p>Partagez vos idées pour protéger la planète</p>
</header>

<main>

    <h2>Ajouter une information</h2>

    <textarea id="message" placeholder="Écris ton idée écologique ici..."></textarea>
    <button onclick="publier()">Publier</button>

    <h2>Messages des élèves</h2>
    <div id="forum"></div>

</main>

<footer>
    <p>© 2024 – EcoApp</p>
</footer>

<script>
    // Charger les messages depuis le navigateur
    let messages = JSON.parse(localStorage.getItem("forumEcoApp") || "[]");

    function afficher() {
        const forum = document.getElementById("forum");
        forum.innerHTML = "";
        messages.forEach(msg => {
            forum.innerHTML += `<div class="post">${msg}</div>`;
        });
    }

    function publier() {
        const texte = document.getElementById("message").value.trim();
        if (texte === "") return;

        messages.push(texte);
        localStorage.setItem("forumEcoApp", JSON.stringify(messages));
        document.getElementById("message").value = "";
        afficher();
    }

    afficher();
</script>

</body>
</html>
