<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mise à jour - No Name</title>
    <link rel="icon" type="image/png" href="Icone.png">
    <style>
        :root {
            --primary: #2e7d32;
            --bg-color: #f3f7f3;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #333;
            text-align: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 90%;
        }
        .icon-box {
            font-size: 60px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        h1 {
            color: var(--primary);
            margin-bottom: 10px;
        }
        p {
            line-height: 1.6;
            color: #666;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #aaa;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-box">🌱</div>
    <h1>Mise à jour en cours</h1>
    <p>Nous améliorons <strong>No Name</strong>.</p>
    
    <div class="loader"></div>
    
    <p>Le site sera de retour à la fin des vacances. Merci de votre patience !</p>
    
    <div class="footer-text">
        © 2026 – Éco-délégués Hippolyte Rémy
    </div>
</div>

</body>
</html>
