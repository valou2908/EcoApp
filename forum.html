<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoApp – Vidéos & Diapo</title>
    <link rel="stylesheet" href="style.css?v=2">
    <style>
        /* DIAPORAMA SANS JS (Scroll Snap) */
        .diapo-scroll {
            display: flex;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            gap: 10px;
            padding: 10px;
            background: #f4f4f4;
            border-radius: 15px;
        }
        .diapo-scroll img {
            flex: 0 0 80%; /* Chaque image prend 80% de la largeur */
            scroll-snap-align: center;
            border-radius: 10px;
            object-fit: contain;
            height: 300px;
            background: white;
        }

        /* STYLE VIDÉO */
        .video-container {
            margin-top: 20px;
            width: 100%;
        }
        video {
            width: 100%;
            border-radius: 15px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<nav class="nav-pc">
    <a href="index.html">Accueil</a>
    <a href="forum.html">Forum</a>
</nav>

<header class="header">
    <h1>Espace Multimédia EcoApp</h1>
    <p>Découvrez nos logos et vidéos</p>
</header>

<main class="container">

    <section class="card">
        <h2>Nos Logos (Faites défiler →)</h2>
        <div class="diapo-scroll">
            <img src="https://github.com/user-attachments/assets/9e7f913a-cf97-4277-a739-e4be507a8925" alt="Logo 1">
            <img src="https://github.com/user-attachments/assets/94cee149-bc73-4ff9-9661-fe47b423d4af" alt="Logo 2">
            <img src="https://via.placeholder.com/600x400?text=Logo+3" alt="Logo 3">
        </div>
    </section>

    <section class="card">
        <h2>Présentation Vidéo</h2>
        <div class="video-container">
            <video controls poster="image-apercu.jpg">
                <source src="ta-video.mp4" type="video/mp4">
                Votre navigateur ne supporte pas la lecture de vidéos.
            </video>
        </div>
    </section>

</main>

<footer class="footer">
    © 2026 – EcoApp
</footer>

</body>
</html>
