<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoApp – Forum</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Correction des fenêtres disproportionnées */
        .container {
            max-width: 800px;
            margin: auto;
            padding: 10px;
        }
        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            overflow: hidden; /* Empêche le contenu de dépasser */
        }
        .post {
            border-bottom: 1px solid #eee;
            padding: 20px 0;
            word-wrap: break-word; /* Force le texte trop long à aller à la ligne */
        }
        .post img {
            max-width: 100%; /* L'image ne dépassera jamais de la fenêtre */
            height: auto;
            border-radius: 8px;
            display: block;
            margin: 10px 0;
        }
        /* Style pour les liens pour qu'ils ne cassent pas le design */
        .post a {
            color: #2e7d32;
            word-break: break-all;
        }
    </style>
</head>
<body>

<main class="container">
    <section class="card">
        <h2>Messages récents</h2>
        <div id="issues">Chargement des messages...</div>
    </section>
</main>

<script>
async function chargerIssues() {
    try {
        const url = "https://api.github.com/repos/valou2908/EcoApp/issues";
        const res = await fetch(url);
        const issues = await res.json();

        const zone = document.getElementById("issues");
        zone.innerHTML = "";

        if (issues.length === 0) {
            zone.innerHTML = "<p>Aucun message pour le moment.</p>";
            return;
        }

        issues.forEach(issue => {
            // Utilisation de marked.parse pour transformer le Markdown en HTML complet
            // Cela gère les images, les liens, les listes, etc.
            const contentHTML = marked.parse(issue.body || "Pas de texte.");

            zone.innerHTML += `
                <div class="post">
                    <h3 style="color: #2e7d32; margin-top:0;">${issue.title}</h3>
                    <div class="post-content">${contentHTML}</div>
                    <small style="color: #666;">Posté par : <strong>${issue.user.login}</strong></small>
                </div>
            `;
        });
    } catch (e) {
        document.getElementById("issues").innerHTML = "Erreur lors du chargement des messages.";
    }
}
chargerIssues();
</script>
</body>
</html>
