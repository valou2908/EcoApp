name: Gestion des Issues Externes

on:
  issues:
    types: [opened]

jobs:
  check-and-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Vérifier l'auteur du ticket
        uses: actions/github-script@v7
        with:
          script: |
            const creator = context.payload.issue.user.login;
            const repository = context.repo;
            
            try {
              // Vérifie si l'auteur est collaborateur
              await github.rest.repos.checkCollaborator({
                owner: repository.owner,
                repo: repository.repo,
                username: creator
              });
            } catch (error) {
              // Si l'auteur n'est PAS collaborateur (erreur 404), on ferme et verrouille
              if (error.status === 404) {
                // Commentaire optionnel pour expliquer la fermeture
                await github.rest.issues.createComment({
                  owner: repository.owner,
                  repo: repository.repo,
                  issue_number: context.issue.number,
                  body: "Désolé, la création de tickets est réservée aux collaborateurs du projet."
                });

                // Fermeture du ticket
                await github.rest.issues.update({
                  owner: repository.owner,
                  repo: repository.repo,
                  issue_number: context.issue.number,
                  state: 'closed'
                });

                // Verrouillage du ticket
                await github.rest.issues.lock({
                  owner: repository.owner,
                  repo: repository.repo,
                  issue_number: context.issue.number,
                  lock_reason: 'resolved'
                });
              }
            }
